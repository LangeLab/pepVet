name: Bug report
description: Report a reproducible package bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal, reproducible example when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproducible example
      description: Include the function call, input, and output or error message.
      render: r
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pepVet version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: session
    attributes:
      label: Session info
      description: Paste `sessionInfo()` if the issue may be environment-specific.
      render: r
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add anything else that helps explain the failure.