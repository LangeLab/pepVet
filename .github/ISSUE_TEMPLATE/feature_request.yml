name: Feature request
description: Propose a new capability or workflow improvement
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: What are you trying to do, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the feature, interface, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this belongs in pepVet
      description: Explain the scientific or workflow value and whether it fits current scope.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or adjacent tools you already tried.