name: BiocCheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RENV_CONFIG_AUTOLOADER_ENABLED: FALSE

jobs:
  bioccheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocCheck
          needs: check

      - name: Run BiocCheck
        run: |
          Rscript -e 'BiocCheck::BiocCheck(".", checkDir = tempdir(), `quitWithStatus` = TRUE, `no-check-bioc-help` = TRUE)'