name: lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RENV_CONFIG_AUTOLOADER_ENABLED: FALSE

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint

      - name: Lint package
        run: |
          Rscript -e 'lints <- lintr::lint_package(); if (length(lints) > 0) { print(lints); quit(status = 1) }'