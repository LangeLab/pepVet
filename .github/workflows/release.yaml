name: Release build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.ref_name }} source package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: always
          dependencies: '"hard"'
          needs: build

      - name: Validate version tag
        run: |
          tag <- Sys.getenv("GITHUB_REF_NAME")
          if (!grepl("^v[0-9]+[.][0-9]+[.][0-9]+$", tag)) {
            stop("Release tag must have the form vX.Y.Z; received: ", tag)
          }
          version <- read.dcf("DESCRIPTION", fields = "Version")[[1L]]
          expected <- paste0("v", version)
          if (!identical(tag, expected)) {
            stop("Tag ", tag, " does not match DESCRIPTION version ", version, ".")
          }
        shell: Rscript {0}

      - name: Build source package in temporary storage
        run: |
          cd "$RUNNER_TEMP"
          R CMD build --no-manual "$GITHUB_WORKSPACE"

      - name: Verify source package
        run: |
          tarballs <- list.files(
            Sys.getenv("RUNNER_TEMP"),
            pattern = "^pepVet_.*[.]tar[.]gz$",
            full.names = TRUE
          )
          if (length(tarballs) != 1L) {
            stop("Expected exactly one pepVet source tarball.")
          }
          cat(
            "Built ", basename(tarballs), " (", file.info(tarballs)$size,
            " bytes)\n",
            sep = ""
          )
        shell: Rscript {0}

      - name: Write SHA-256 checksum
        run: |
          cd "$RUNNER_TEMP"
          sha256sum pepVet_*.tar.gz > pepVet_${GITHUB_REF_NAME#v}.tar.gz.sha256

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pepVet-${{ github.ref_name }}
          path: |
            ${{ runner.temp }}/pepVet_*.tar.gz
            ${{ runner.temp }}/pepVet_*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 90
