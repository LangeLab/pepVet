name: test-coverage

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RENV_CONFIG_AUTOLOADER_ENABLED: FALSE

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Compute test coverage
        run: |
          Rscript -e 'cov <- covr::package_coverage(); dir.create("artifacts", showWarnings = FALSE); writeLines(capture.output(print(cov)), "artifacts/coverage.txt"); cat(sprintf("Coverage: %.2f%%\n", covr::percent_coverage(cov)))'

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage.txt