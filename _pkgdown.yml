template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2C5F8A"
    base_font: {google: "Source Sans Pro"}
    heading_font: {google: "Source Sans Pro"}
    code_font: {google: "JetBrains Mono"}

home:
  title: "pepVet: Proteolytic Digest Evaluation for Proteomics"
  description: >
    Simulate, score, compare, and report proteolytic digests for LC-MS/MS proteomics workflows. Given a protein and an enzyme, pepVet shows how the resulting peptide set behaves, which workflow preset fits the experiment, and which enzyme is the best starting point before any sample reaches the instrument.

url: https://langelab.github.io/pepVet/

repo:
  branch: main

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [github]
  components:
    intro:
      text: Get Started
      href: articles/pepVet-introduction.html
    articles:
      text: Articles
      menu:
        - text: "Workflow"
        - text: Getting Started
          href: articles/pepVet-introduction.html
        - text: "---"
        - text: "Guides"
        - text: Choosing a Proteolytic Enzyme
          href: articles/enzyme-selection.html
        - text: Workflow Presets
          href: articles/workflow-presets.html
        - text: Understanding the Scoring Model
          href: articles/scoring-model.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html

reference:
  - title: "Digest simulation"
    desc: >
      Cleave protein sequences into peptide fragments using any of 40
      cleaver-compatible enzyme rules.
    contents:
      - annotate_cleavage_sites
      - digest_protein

  - title: "Scoring"
    desc: >
      Summarise a peptide set into component scores, workflow-aware scoring parameters, and a weighted composite suitability verdict.
    contents:
      - score_peptides
      - pepvet_preset

  - title: "Peptide properties"
    desc: >
      Calculate peptide mass and isoelectric point annotations used in
      fractionation-aware planning workflows.
    contents:
      - calculate_peptide_mass
      - calculate_pI

  - title: "Evaluation and comparison"
    desc: >
      Combine digest and scoring into a single call, compare enzymes
      side-by-side, or get a programmatic enzyme recommendation.
    contents:
      - evaluate_digest
      - compare_digests
      - recommend_enzyme

  - title: "Batch workflows"
    desc: >
      Evaluate all proteins in a multi-FASTA in one call, compare enzymes
      across a proteome, summarise the score distribution, and triage
      proteins by difficulty.
    contents:
      - batch_evaluate
      - batch_compare_enzymes
      - summarize_batch
      - triage_proteins

  - title: "Visualisation"
    desc: >
      Plot digest quality, score components, enzyme comparisons, batch
      summaries, and proteome-level overviews.
    contents:
      - plot_digest_profile
      - plot_length_distribution
      - plot_gravy_landscape
      - plot_mz_distribution
      - plot_pI_distribution
      - plot_coverage_map
      - plot_cleavage_map
      - plot_missed_cleavage_impact
      - plot_enzyme_comparison
      - plot_protein_comparison
      - plot_component_scatter
      - plot_batch_summary
      - plot_batch_comparison
        - plot_proteome_overview
      - plot_enzyme_protein_heatmap

  - title: "Reporting"
    desc: >
      Render styled, colour-coded console summaries of digest quality.
      `pepvet_check()` combines evaluation and reporting in a single call
      for interactive use.
    contents:
      - digest_report
      - pepvet_check

  - title: "Export"
    desc: >
      Export valid peptide lists to downstream proteomics tools.
      Supported formats: Skyline transition list, generic annotated CSV, and
      FASTA.
    contents:
      - export_peptide_list

  - title: "Reference data"
    desc: >
      Amino acid property table used by the scoring engine.
    contents:
      - aa_properties

  - title: "Package"
    contents:
      - pepVet-package

news:
  releases:
    - text: "pepVet 0.1.0"
      href: news/index.html
