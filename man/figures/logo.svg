<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="56" fill="#2C5F8A" />

  <!-- Inner circle ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#4A8AB5" stroke-width="2" />

  <!-- Peptide backbone: zigzag chain across the middle -->
  <!-- Nodes (residues) -->
  <circle cx="22" cy="62" r="5" fill="#FFFFFF" opacity="0.90"/>
  <circle cx="36" cy="50" r="5" fill="#FFFFFF" opacity="0.90"/>
  <circle cx="50" cy="62" r="5" fill="#FFFFFF" opacity="0.90"/>
  <circle cx="64" cy="50" r="5" fill="#FFFFFF" opacity="0.90"/>
  <circle cx="78" cy="62" r="5" fill="#FFFFFF" opacity="0.90"/>
  <circle cx="92" cy="50" r="5" fill="#FFFFFF" opacity="0.50"/>

  <!-- Bonds between residues -->
  <line x1="22" y1="62" x2="36" y2="50" stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.85"/>
  <line x1="36" y1="50" x2="50" y2="62" stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.85"/>
  <line x1="50" y1="62" x2="64" y2="50" stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.85"/>
  <line x1="64" y1="50" x2="78" y2="62" stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.85"/>
  <line x1="78" y1="62" x2="92" y2="50" stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.45"/>

  <!-- Checkmark overlaid on the right side (the "vet" part) -->
  <polyline
    points="68,80 76,90 96,68"
    fill="none"
    stroke="#7EE8A2"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- "pV" monogram at bottom -->
  <text
    x="60"
    y="114"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="600"
    letter-spacing="2"
    fill="#FFFFFF"
    opacity="0.0"
  >pepVet</text>
</svg>
